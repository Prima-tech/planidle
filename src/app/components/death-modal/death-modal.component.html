<div class="death-backdrop">
  <div class="death-panel">

    <div class="death-header">
      <span class="death-icon">💀</span>
      <h2 class="death-title">Has muerto</h2>
      <p class="death-subtitle">Tu aventura continúa...</p>
    </div>

    <div class="death-divider"></div>

    <div class="death-body">
      <div class="death-row">
        <span class="death-label">Experiencia del nivel</span>
        <span class="death-value death-value--lost">Perdida</span>
      </div>
      <div class="death-row">
        <span class="death-label">Vida</span>
        <span class="death-value death-value--restored">Restaurada</span>
      </div>
      <div class="death-row">
        <span class="death-label">Destino</span>
        <span class="death-value">Ciudad</span>
      </div>
    </div>

    <div class="death-divider"></div>

    <button class="death-accept-btn" (click)="revive()">
      Aceptar
    </button>

  </div>
</div>
