<div class="summon-header">Invocar</div>

<div class="summon-tabs">
  <div
    *ngFor="let tab of tabs; let i = index"
    class="summon-tab"
    [class.active]="i === activeTab"
    [title]="tab.title"
    (click)="activeTab = i"
  >
    <ion-icon [name]="tab.icon"></ion-icon>
  </div>
</div>

<div class="summon-list" *ngIf="activeTab === 0">
  <div *ngFor="let group of enemyGroups" class="enemy-group">

    <span class="group-name">{{ group.name }}</span>

    <div class="group-row">

      <button class="enemy-card base" (click)="summon(group.base.type)">
        <div class="enemy-frame">
          <div class="enemy-frame-inner"
               [style.background-image]="'url(' + group.base.spriteUrl + ')'">
          </div>
        </div>
        <span class="tier-label">Normal</span>
      </button>

      <button class="enemy-card elite"
              [disabled]="!group.elite"
              (click)="group.elite && summon(group.elite.type)">
        <div class="enemy-frame">
          <div class="enemy-frame-inner"
               [style.background-image]="group.elite ? 'url(' + group.elite.spriteUrl + ')' : 'none'">
          </div>
        </div>
        <span class="tier-label">Elite</span>
      </button>

      <button class="enemy-card oblivion"
              [disabled]="!group.oblivion"
              (click)="group.oblivion && summon(group.oblivion.type)">
        <div class="enemy-frame">
          <div class="enemy-frame-inner"
               [style.background-image]="group.oblivion ? 'url(' + group.oblivion.spriteUrl + ')' : 'none'">
          </div>
        </div>
        <span class="tier-label">Oblivion</span>
      </button>

    </div>
  </div>
</div>

<div class="map-list" *ngIf="activeTab === 1">
  <button
    *ngFor="let map of maps"
    class="map-card"
    [class.current]="map.id === currentMapId"
    (click)="teleport(map.id)"
  >
    <div class="map-info">
      <span class="map-name">{{ map.name }}</span>
      <span class="map-enemies" *ngIf="map.spawns.length > 0">
        {{ map.spawns[0].enemyType }}
        <ng-container *ngIf="map.spawns.length > 1"> +{{ map.spawns.length - 1 }}</ng-container>
      </span>
      <span class="map-enemies empty" *ngIf="map.spawns.length === 0">Sin enemigos</span>
    </div>
    <span class="map-badge" *ngIf="map.id === currentMapId">Aquí</span>
    <span class="map-go" *ngIf="map.id !== currentMapId">▶</span>
  </button>
</div>

<div class="item-list" *ngIf="activeTab === 2">
  <div class="item-grid">
    <button *ngFor="let entry of itemCatalog" class="item-card" (click)="giveItem(entry)" [title]="entry.name">
      <div class="item-frame">
        <div *ngIf="entry.iconSheet"
             class="item-icon-sheet"
             [class.item-icon-sheet--equip]="entry.iconFrameSize != null"
             [style.background-image]="'url(' + entry.iconSheet + ')'"
             [style.background-size]="getSheetBgSize(entry.iconFrameCols, entry.iconFrameSize)"
             [style.background-position]="getSheetPos(entry.iconFrame, entry.iconFrameCols, entry.iconFrameSize)">
        </div>
        <img *ngIf="entry.icon && !entry.iconSheet" [src]="entry.icon" class="item-icon">
      </div>
      <span class="item-name">{{ entry.name }}</span>
    </button>
  </div>
</div>
