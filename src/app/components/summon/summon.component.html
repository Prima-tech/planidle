<div class="summon-tabs">
  <div
    *ngFor="let tab of tabs; let i = index"
    class="summon-tab"
    [class.active]="i === activeTab"
    [title]="tab.title"
    (click)="activeTab = i"
  >
    <ion-icon [name]="tab.icon"></ion-icon>
  </div>
</div>

<div class="summon-list" *ngIf="activeTab === 0">

  <div class="item-subtabs">
    <div
      *ngFor="let tab of enemySubTabs; let i = index"
      class="item-subtab"
      [class.active]="i === activeEnemyTab"
      (click)="activeEnemyTab = i"
    >{{ tab }}</div>
  </div>

  <ng-container [ngSwitch]="activeEnemyTab">

    <ng-container *ngSwitchCase="0">
      <div *ngFor="let group of slimeGroups" class="enemy-group">
        <ng-container *ngTemplateOutlet="enemyGroupRow; context: { $implicit: group }"></ng-container>
      </div>
    </ng-container>

    <ng-container *ngSwitchCase="1">
      <div *ngFor="let group of miscGroups" class="enemy-group">
        <ng-container *ngTemplateOutlet="enemyGroupRow; context: { $implicit: group }"></ng-container>
      </div>
    </ng-container>

  </ng-container>

</div>

<ng-template #enemyGroupRow let-group>
  <span class="group-name">{{ group.name }}</span>

  <div class="group-row">

    <button class="enemy-card base" (click)="summon(group.base.type)">
      <div class="enemy-frame">
        <div class="enemy-frame-inner"
             [ngStyle]="enemyFrameStyle(group.base)"
             [style.background-image]="'url(' + group.base.spriteUrl + ')'">
        </div>
      </div>
      <span class="tier-label">Normal</span>
    </button>

    <button class="enemy-card elite"
            [disabled]="!group.elite"
            (click)="group.elite && summon(group.elite.type)">
      <div class="enemy-frame">
        <div class="enemy-frame-inner"
             [ngStyle]="group.elite ? enemyFrameStyle(group.elite) : {}"
             [style.background-image]="group.elite ? 'url(' + group.elite.spriteUrl + ')' : 'none'">
        </div>
      </div>
      <span class="tier-label">Elite</span>
    </button>

    <button class="enemy-card oblivion"
            [disabled]="!group.oblivion"
            (click)="group.oblivion && summon(group.oblivion.type)">
      <div class="enemy-frame">
        <div class="enemy-frame-inner"
             [ngStyle]="group.oblivion ? enemyFrameStyle(group.oblivion) : {}"
             [style.background-image]="group.oblivion ? 'url(' + group.oblivion.spriteUrl + ')' : 'none'">
        </div>
      </div>
      <span class="tier-label">Oblivion</span>
    </button>

  </div>
</ng-template>

<div class="item-list" *ngIf="activeTab === 1">

  <div class="item-subtabs">
    <div
      *ngFor="let tab of itemSubTabs; let i = index"
      class="item-subtab"
      [class.active]="i === activeItemTab"
      (click)="activeItemTab = i"
    >{{ tab }}</div>
  </div>

  <ng-container [ngSwitch]="activeItemTab">

    <div class="armor-accordion" *ngSwitchCase="0">
      <div *ngFor="let group of armorGroups" class="accordion-section">
        <div class="accordion-header" (click)="toggleGroup(group.category)">
          <span class="accordion-title">{{ group.category }}</span>
          <span class="accordion-count">{{ group.items.length }}</span>
          <ion-icon [name]="openGroups.has(group.category) ? 'chevron-up-outline' : 'chevron-down-outline'" class="accordion-chevron"></ion-icon>
        </div>
        <div class="accordion-body" *ngIf="openGroups.has(group.category)">
          <div class="item-grid">
            <ng-container *ngTemplateOutlet="itemCards; context: { $implicit: group.items }"></ng-container>
          </div>
        </div>
      </div>
    </div>

    <div class="item-grid" *ngSwitchCase="1">
      <ng-container *ngTemplateOutlet="itemCards; context: { $implicit: weaponCatalog }"></ng-container>
    </div>

    <div class="item-grid" *ngSwitchCase="2">
      <ng-container *ngTemplateOutlet="itemCards; context: { $implicit: miscCatalog }"></ng-container>
    </div>

  </ng-container>

</div>

<div class="chest-grid" *ngIf="activeTab === 2">
  <button *ngFor="let i of chestIndices" class="chest-card" (click)="summonChest(i)">
    <div [ngStyle]="chestFrameStyle(i)"></div>
    <span class="chest-label">Cofre {{ i + 1 }}</span>
  </button>
</div>

<div class="icon-viewer" *ngIf="activeTab === 3">

  <div class="item-subtabs">
    <div
      *ngFor="let tab of iconSubTabs; let i = index"
      class="item-subtab"
      [class.active]="i === activeIconTab"
      (click)="activeIconTab = i"
    >{{ tab }}</div>
  </div>

  <div class="misc-icon-grid" *ngIf="activeIconTab === 0">
    <div class="misc-icon-cell" *ngFor="let icon of miscIcons">
      <div [ngStyle]="miscIconStyle(icon.frame)"></div>
      <span class="misc-icon-name">{{ icon.name }}</span>
    </div>
  </div>

  <div class="item-empty" *ngIf="activeIconTab === 1">Próximamente</div>

</div>

<ng-template #itemCards let-entries>
  <button *ngFor="let entry of entries" class="item-card" (click)="giveItem(entry)" [title]="entry.name">
    <div class="item-frame">
      <div *ngIf="entry.iconSheet"
           class="item-icon-sheet"
           [class.item-icon-sheet--equip]="entry.iconFrameSize != null"
           [class.item-icon-sheet--armour]="entry.category === 'Armadura'"
           [class.item-icon-sheet--pants]="entry.category === 'Pantalones'"
           [class.item-icon-sheet--boots]="entry.category === 'Botas'"
           [class.item-icon-sheet--weapon]="entry.category === 'Arma'"
           [style.background-image]="'url(' + entry.iconSheet + ')'"
           [style.background-size]="getSheetBgSize(entry.iconFrameCols, entry.iconFrameSize, entry.iconContentSize)"
           [style.background-position]="getSheetPos(entry.iconFrame, entry.iconFrameCols, entry.iconFrameSize, entry.iconContentSize)">
      </div>
      <img *ngIf="entry.icon && !entry.iconSheet" [src]="entry.icon" class="item-icon">
    </div>
    <span class="item-name">{{ entry.name }}</span>
  </button>
  <div class="item-empty" *ngIf="!entries.length">{{ 'SUMMON.NO_ITEMS' | translate }}</div>
</ng-template>
