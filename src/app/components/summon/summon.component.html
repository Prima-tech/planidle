<div class="summon-header">Invocar</div>

<div class="summon-tabs">
  <div
    *ngFor="let tab of tabs; let i = index"
    class="summon-tab"
    [class.active]="i === activeTab"
    (click)="activeTab = i"
  >
    {{ tab }}
  </div>
</div>

<div class="summon-grid" *ngIf="activeTab === 0">
  <button
    *ngFor="let enemy of enemies"
    class="enemy-card"
    [class.elite]="enemy.tier === 'elite'"
    [class.oblivion]="enemy.tier === 'oblivion'"
    (click)="summon(enemy.type)"
  >
    <!-- Contenedor exterior: 48×48 con overflow:hidden -->
    <div class="enemy-frame">
      <!-- Div interior: tamaño del frame (64×64) escalado a 48×48 con transform.
           El overflow:hidden recorta al primer frame antes de escalar. -->
      <div
        class="enemy-frame-inner"
        [style.background-image]="'url(' + enemy.spriteUrl + ')'"
      ></div>
    </div>
    <span class="enemy-name">{{ enemy.label }}</span>
    <span class="enemy-hp">{{ enemy.hp }} HP</span>
  </button>
</div>
