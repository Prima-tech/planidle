<app-modal-container #menuModal></app-modal-container>
<app-modal-container #gameSettingsModal></app-modal-container>
<app-modal-container #inventoryModal></app-modal-container>
<app-modal-container #equipmentModal></app-modal-container>
<app-modal-container #mapStatsModal></app-modal-container>
<app-modal-container #summonModal></app-modal-container>
<app-modal-container #skillSlotsModal></app-modal-container>
<app-modal-container #skillDetailModal></app-modal-container>
<app-modal-container #worldMapModal></app-modal-container>

<ion-footer>
  <ion-toolbar>

    <div class="icon-menu-wrapper" (click)="togglePage()">
      <ion-icon [name]="page === 'main' ? 'swap-horizontal-outline' : 'arrow-back-outline'" class="footer-ion-icon"></ion-icon>
    </div>

    <div class="icon-menu-wrapper" [class.active]="autoAttack.isEnabled" (click)="toggleAutoAttack()">
      <ion-icon name="infinite-outline" class="footer-ion-icon"></ion-icon>
      <span class="btn-label">Auto</span>
    </div>

    <!-- Página principal -->
    <ng-container *ngIf="page === 'main'">
      <div class="icon-menu-wrapper" [class.active]="worldMapModal.isOpenModal()" (click)="openWorldMap()">
        <ion-icon name="map-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Mapa</span>
      </div>

      <div class="icon-menu-wrapper" [class.active]="equipmentModal.isOpenModal()" (click)="openEquipment()">
        <ion-icon name="shirt-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Equipo</span>
      </div>

      <div class="icon-menu-wrapper" [class.active]="summonModal.isOpenModal()" (click)="openSummon()">
        <ion-icon name="flash-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Invocar</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="gameSettingsModal.isOpenModal()" (click)="openGameSettings()">
        <ion-icon name="settings-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Ajustes</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="menuModal.isOpenModal()" (click)="openMenu()">
        <ion-icon name="construct-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Admin</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="inventoryModal.isOpenModal()" (click)="openInventory()">
        <ion-icon name="bag-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Bag</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="mapStatsModal.isOpenModal()" (click)="openMapStats()">
        <ion-icon name="bar-chart-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Stats</span>
      </div>

    </ng-container>

    <!-- Página de habilidades -->
    <ng-container *ngIf="page === 'skills'">
      <div class="icon-menu-wrapper lock-btn" [class.active]="!locked" (click)="toggleLock()">
        <ion-icon [name]="locked ? 'lock-closed-outline' : 'lock-open-outline'" class="footer-ion-icon"></ion-icon>
      </div>
      <div class="skill-slots-row">
        <div *ngFor="let slot of skillSlots"
             class="icon-menu-wrapper skill-slot"
             [class.active]="activeSkillSlot === slot && skillSlotsModal.isOpenModal()"
             [class.flashing]="isFlashing(slot)"
             [class.no-target]="locked && slotNoTarget(slot)"
             [style.--cd-angle]="cdAngles[slot] + 'deg'"
             (click)="onSkillSlotClick(slot)">
          <img *ngIf="slotIconImage(slot)" [src]="slotIconImage(slot)" class="skill-icon-img" />
          <ion-icon *ngIf="!slotIconImage(slot) && slotIcon(slot)" [name]="slotIcon(slot)" class="footer-ion-icon"></ion-icon>
          <span *ngIf="!slotIconImage(slot) && !slotIcon(slot) && !locked" class="skill-placeholder">+</span>
          <div *ngIf="cdAngles[slot] > 0" class="cd-overlay"></div>
          <span *ngIf="cdSeconds[slot]" class="cd-text">{{ cdSeconds[slot] }}</span>
        </div>
      </div>
    </ng-container>

  </ion-toolbar>
</ion-footer>
