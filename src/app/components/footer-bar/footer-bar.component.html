<app-modal-container #menuModal></app-modal-container>
<app-modal-container #inventoryModal></app-modal-container>
<app-modal-container #equipmentModal></app-modal-container>
<app-modal-container #mapStatsModal></app-modal-container>
<app-modal-container #mapKillsModal></app-modal-container>
<app-modal-container #statsModal></app-modal-container>
<app-modal-container #summonModal></app-modal-container>
<app-modal-container #skillSlotsModal></app-modal-container>
<app-modal-container #skillDetailModal></app-modal-container>

<ion-footer>
  <ion-toolbar>

    <div class="icon-menu-wrapper" (click)="togglePage()">
      <ion-icon [name]="page === 'main' ? 'swap-horizontal-outline' : 'arrow-back-outline'" class="footer-ion-icon"></ion-icon>
    </div>

    <!-- Página principal -->
    <ng-container *ngIf="page === 'main'">
      <div class="icon-menu-wrapper" [class.active]="equipmentModal.isOpenModal()" (click)="openEquipment()">
        <ion-icon name="shirt-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Equipo</span>
      </div>

      <div class="icon-menu-wrapper" [class.active]="summonModal.isOpenModal()" (click)="openSummon()">
        <ion-icon name="flash-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Invocar</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="menuModal.isOpenModal()" (click)="openMenu()">
        <ion-icon name="settings-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Ajustes</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="inventoryModal.isOpenModal()" (click)="openInventory()">
        <ion-icon name="bag-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Bag</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="mapStatsModal.isOpenModal()" (click)="openMapStats()">
        <ion-icon name="bar-chart-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Stats</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="mapKillsModal.isOpenModal()" (click)="openMapKills()">
        <ion-icon name="skull-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Bajas</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="statsModal.isOpenModal()" (click)="openStats()">
        <ion-icon name="podium-outline" class="footer-ion-icon"></ion-icon>
        <span class="btn-label">Rank</span>
      </div>
    </ng-container>

    <!-- Página de habilidades -->
    <ng-container *ngIf="page === 'skills'">
      <div class="icon-menu-wrapper" [class.active]="!locked" (click)="toggleLock()">
        <ion-icon [name]="locked ? 'lock-closed-outline' : 'lock-open-outline'" class="footer-ion-icon"></ion-icon>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="activeSkillSlot === 1 && skillSlotsModal.isOpenModal()" [class.on-cooldown]="slotOnCooldown(1)" (click)="onSkillSlotClick(1)">
        <ion-icon *ngIf="slotIcon(1)" [name]="slotIcon(1)" class="footer-ion-icon"></ion-icon>
        <span *ngIf="!slotIcon(1) && !locked" class="skill-placeholder">+</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="activeSkillSlot === 2 && skillSlotsModal.isOpenModal()" [class.on-cooldown]="slotOnCooldown(2)" (click)="onSkillSlotClick(2)">
        <ion-icon *ngIf="slotIcon(2)" [name]="slotIcon(2)" class="footer-ion-icon"></ion-icon>
        <span *ngIf="!slotIcon(2) && !locked" class="skill-placeholder">+</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="activeSkillSlot === 3 && skillSlotsModal.isOpenModal()" [class.on-cooldown]="slotOnCooldown(3)" (click)="onSkillSlotClick(3)">
        <ion-icon *ngIf="slotIcon(3)" [name]="slotIcon(3)" class="footer-ion-icon"></ion-icon>
        <span *ngIf="!slotIcon(3) && !locked" class="skill-placeholder">+</span>
      </div>

      <div class="icon-menu-wrapper right" [class.active]="activeSkillSlot === 4 && skillSlotsModal.isOpenModal()" [class.on-cooldown]="slotOnCooldown(4)" (click)="onSkillSlotClick(4)">
        <ion-icon *ngIf="slotIcon(4)" [name]="slotIcon(4)" class="footer-ion-icon"></ion-icon>
        <span *ngIf="!slotIcon(4) && !locked" class="skill-placeholder">+</span>
      </div>
    </ng-container>

  </ion-toolbar>
</ion-footer>
