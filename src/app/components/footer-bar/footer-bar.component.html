<app-modal-container #gameSettingsModal></app-modal-container>
<app-modal-container #inventoryModal></app-modal-container>
<app-modal-container #equipmentModal></app-modal-container>
<app-modal-container #summonModal></app-modal-container>
<app-modal-container #chestModal (closed)="onChestModalClosed()"></app-modal-container>
<app-modal-container #skillDetailModal [persistent]="true"></app-modal-container>
<app-modal-container #worldMapModal></app-modal-container>
<app-modal-container #progressModal></app-modal-container>
<app-modal-container #shopModal></app-modal-container>
<app-modal-container #buildModal></app-modal-container>
<app-modal-container #buildShopModal (closed)="onBuildShopModalClosed()"></app-modal-container>
<app-modal-container #forgeModal (closed)="onForgeModalClosed()"></app-modal-container>

<!-- Modo Mundo: has muerto → al aceptar, teletransporte a la capital del planeta -->
<div class="rh-backdrop" *ngIf="runDeadOpen">
  <div class="rh-panel">
    <div class="rh-header">
      <ion-icon class="rh-icon" name="skull"></ion-icon>
      <h2 class="rh-title">{{ 'RUN.DEATH_TITLE' | translate }}</h2>
    </div>
    <div class="rh-divider"></div>
    <div class="rh-body">
      <p class="rh-msg">{{ 'RUN.DEATH_MSG' | translate }}</p>
    </div>
    <div class="rh-divider"></div>
    <div class="rh-actions">
      <button class="rh-btn rh-btn--confirm" (click)="acceptDeath()">{{ 'RUN.DEATH_ACCEPT' | translate }}</button>
    </div>
  </div>
</div>

<!-- Confirmación de volver a casa (Modo Mundo): se pierde el progreso de la expedición -->
<div class="rh-backdrop" *ngIf="confirmHomeOpen" (click)="cancelGoHome()">
  <div class="rh-panel" (click)="$event.stopPropagation()">
    <div class="rh-header">
      <ion-icon class="rh-icon" name="home"></ion-icon>
      <h2 class="rh-title">{{ 'RUN.GO_HOME_TITLE' | translate }}</h2>
    </div>
    <div class="rh-divider"></div>
    <div class="rh-body">
      <p class="rh-msg">{{ 'RUN.GO_HOME_MSG' | translate }}</p>
      <p class="rh-warn">{{ 'RUN.GO_HOME_WARN' | translate }}</p>
    </div>
    <div class="rh-divider"></div>
    <div class="rh-actions">
      <button class="rh-btn rh-btn--cancel" (click)="cancelGoHome()">{{ 'RUN.GO_HOME_NO' | translate }}</button>
      <button class="rh-btn rh-btn--confirm" (click)="confirmGoHome()">{{ 'RUN.GO_HOME_YES' | translate }}</button>
    </div>
  </div>
</div>

<button class="auto-attack-fab" *ngIf="!(runMode$ | async)" [class.active]="autoAttack.isEnabled" (click)="toggleAutoAttack()">
  <ion-icon name="infinite"></ion-icon>
</button>
<button class="auto-skill-fab" *ngIf="!(runMode$ | async)" [class.active]="autoAttack.skillsEnabled" (click)="toggleAutoSkills()">
  <ion-icon name="sparkles"></ion-icon>
</button>
<!-- Candado: edita/usa las habilidades del HUD (mismo tamaño que los FAB de auto). -->
<button class="lock-fab" *ngIf="!(runMode$ | async)" [class.active]="!locked" (click)="toggleLock()">
  <ion-icon [name]="locked ? 'lock-closed' : 'lock-open'"></ion-icon>
</button>

<!-- Hub de botones (abajo-izquierda): el tirador abre/cierra el hub con animación. -->
<div class="hub" [class.hub--open]="hubOpen">

  <!-- Tirador (abrir/cerrar): mismo ancho que un botón pero la mitad de fino. -->
  <button class="hub-toggle" (click)="toggleHub()">
    <ion-icon [name]="hubOpen ? 'chevron-back' : 'chevron-forward'"></ion-icon>
  </button>

  <!-- Botones del hub: se esconden con animación al cerrar. -->
  <div class="hub-buttons">
    <!-- Modo Mundo: volver al mapa principal (capital) del planeta -->
    <button class="page-toggle" *ngIf="(runMode$ | async)" (click)="askGoHome()">
      <ion-icon name="home"></ion-icon>
    </button>

    <div class="icon-menu-wrapper" [class.active]="summonModal.isOpenModal()" (click)="openSummon()">
      <ion-icon name="flash" class="footer-ion-icon"></ion-icon>
    </div>

    <div class="icon-menu-wrapper" [class.active]="progressModal.isOpenModal()" (click)="openProgress()">
      <ion-icon name="rocket" class="footer-ion-icon"></ion-icon>
    </div>

    <div class="icon-menu-wrapper" *ngIf="currentMapId === 'hogar' && !(runMode$ | async)"
         [class.active]="buildModal.isOpenModal()" (click)="openBuild()">
      <ion-icon name="hammer" class="footer-ion-icon"></ion-icon>
    </div>
  </div>

</div>
