<div class="ach-toast-stack">
  <div
    *ngFor="let t of toasts"
    class="ach-toast"
    [class.ach-toast--leaving]="t.leaving"
  >
    <ion-icon [name]="t.icon" class="ach-toast-icon"></ion-icon>
    <div class="ach-toast-body">
      <span class="ach-toast-label">{{ t.label }}</span>
      <span class="ach-toast-name">{{ t.name }}</span>
    </div>
  </div>
</div>
