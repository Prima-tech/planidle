<div class="detail-panel" *ngIf="item" [ngStyle]="panelStyle">

  <div *ngIf="heading" class="detail-heading">{{ heading }}</div>

  <div class="detail-header">
    <span class="detail-icon-box" *ngIf="item.iconSheet != null"
          [style.background-image]="'url(' + item.iconSheet + ')'"
          [style.background-size]="getSheetBgSize(item.iconFrameCols, item.iconFrameSize, item.iconContentSize)"
          [style.background-position]="getSheetPos(item.iconFrame, item.iconFrameCols, item.iconFrameSize, item.iconContentSize)">
    </span>
    <img *ngIf="item.icon && item.iconSheet == null" [src]="item.icon" class="detail-icon">
    <span *ngIf="!item.icon && item.iconSheet == null" class="detail-icon-fallback">{{ item.name.charAt(0) }}</span>
    <span class="detail-name">{{ item.name }}</span>
  </div>

  <p *ngIf="item.description" class="detail-description">{{ item.description }}</p>

  <ng-container *ngIf="item.stats">
    <div class="detail-divider"></div>
    <div class="detail-stats">
      <div *ngFor="let stat of item.stats | keyvalue" class="stat-row">
        <span class="stat-label">{{ statLabel(stat.key) | translate }}</span>
        <span class="stat-value">{{ stat.value }}</span>
      </div>
    </div>
  </ng-container>

  <!-- Mochilas: huecos de inventario que añade al equiparse -->
  <ng-container *ngIf="bagSlots > 0">
    <div class="detail-divider"></div>
    <div class="detail-stats">
      <div class="stat-row">
        <span class="stat-label">{{ 'INVENTORY.BAG_SLOTS' | translate }}</span>
        <span class="stat-value">+{{ bagSlots }}</span>
      </div>
    </div>
  </ng-container>

  <div *ngIf="item.mergeable && item.sum !== undefined" class="detail-quantity">
    {{ 'INVENTORY.QUANTITY' | translate }} {{ item.sum }}
  </div>

</div>
