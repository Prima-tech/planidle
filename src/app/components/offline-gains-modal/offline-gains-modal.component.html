<div class="afk-backdrop" (click)="collect()">
  <div class="afk-panel" (click)="$event.stopPropagation()">

    <div class="afk-header">
      <ion-icon name="time-outline" class="afk-header-icon"></ion-icon>
      <div>
        <div class="afk-title">Ganancias AFK</div>
        <div class="afk-subtitle">{{ gains.mapName }} · {{ elapsedText }} fuera</div>
      </div>
    </div>

    <div class="afk-section-label">Enemigos eliminados</div>

    <div class="afk-rows">
      <div class="afk-row" *ngFor="let entry of gains.enemyGains">
        <span class="afk-label">{{ entry.displayName }}</span>
        <span class="afk-value">{{ entry.kills | number }}</span>
      </div>
    </div>

    <div class="afk-section-label">Recompensas</div>

    <div class="afk-rows">
      <div class="afk-row">
        <span class="afk-label">Monedas</span>
        <span class="afk-value afk-value--coins">+{{ gains.coins | number }}</span>
      </div>
      <div class="afk-row">
        <span class="afk-label">Experiencia</span>
        <span class="afk-value afk-value--exp">+{{ gains.exp | number }}</span>
      </div>
    </div>

    <button class="afk-collect-btn" (click)="collect()">Recoger</button>

  </div>
</div>
