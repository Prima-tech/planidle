<div class="rs-block" [class.rs-block--open]="panelOpen">

  <!-- Ajustes: flotante en la esquina superior derecha (en exploración no hay minimap;
       mismo botón que en el minimap) -->
  <button class="rs-settings" (click)="openSettings.emit()">
    <img src="assets/icon/menu/config.png" alt="" draggable="false" />
  </button>

  <!-- Widget: metros (izquierda) + estrellas (derecha), sin barras -->
  <div class="rs-widget">
    <div class="rs-stat rs-stat--meters">
      <span class="rs-val">{{ distance$ | async | compactNumber }}</span><span class="rs-unit">m</span>
    </div>
    <div class="rs-stat">
      <img class="rs-img" src="assets/sprites/resources/world_mode/star/star.png" alt="" draggable="false" />
      <span class="rs-val">{{ stars$ | async }}</span>
    </div>
  </div>

  <!-- Tirador: despliega el panel hacia abajo -->
  <button class="rs-open-btn" (click)="togglePanel()">
    <ion-icon [name]="panelOpen ? 'chevron-up-outline' : 'chevron-down-outline'"></ion-icon>
  </button>

  <!-- Pestañas laterales (fuera del panel, pegadas a su borde izquierdo), estilo
       ventana de equipo: objetivos (por comprar) / completos (ya comprados). -->
  <div class="rs-vtabs" *ngIf="panelOpen">
    <button class="rs-vtab" [class.active]="tab === 'objetivos'" (click)="tab = 'objetivos'" [title]="'RUN.MS_PENDING' | translate">
      <ion-icon name="flag-outline"></ion-icon>
    </button>
    <button class="rs-vtab" [class.active]="tab === 'completos'" (click)="tab = 'completos'" [title]="'RUN.MS_DONE' | translate">
      <ion-icon name="checkmark-done-outline"></ion-icon>
    </button>
  </div>

  <!-- Panel desplegable: hitos comprables con estrellas (abre hasta cerca del footer). -->
  <div class="rs-panel" *ngIf="panelOpen">

    <ng-container *ngIf="(milestones$ | async) as owned">
      <ng-container *ngIf="forTab(owned) as list">
        <div class="rs-ms" *ngFor="let m of list">
          <div class="rs-ms-frame"><ion-icon [name]="m.icon"></ion-icon></div>
          <div class="rs-ms-body">
            <span class="rs-ms-name">{{ m.labelKey | translate }}</span>
            <span class="rs-ms-desc">{{ m.descKey | translate }}</span>
          </div>
          <button class="rpg-btn rpg-btn--sm rs-ms-buy" *ngIf="tab === 'objetivos'" [disabled]="!canBuy(m)" (click)="buy(m)">
            <img class="rs-ms-star" src="assets/sprites/resources/world_mode/star/star.png" alt="" draggable="false" />
            <span>{{ m.cost }}</span>
          </button>
        </div>
        <div class="rs-empty" *ngIf="list.length === 0">{{ 'RUN.MS_NONE' | translate }}</div>
      </ng-container>
    </ng-container>
  </div>

</div>

<!-- Botón de mapa: FUERA de la barra, pegado a su izquierda. Abre la interfaz de
     mapa (world-map-panel); en exploración no hay minimap para abrirlo. Solo
     disponible tras comprar el hito 'map_1_1' (desbloquear mapa 1-1). -->
<button class="rs-map-btn" *ngIf="(milestones$ | async)?.includes('map_1_1')" (click)="openMap.emit()">
  <img class="rs-map-btn__icon" src="assets/sprites/resources/world_mode/map.png" alt="" draggable="false" />
</button>
