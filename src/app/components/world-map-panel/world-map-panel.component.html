<div class="panel-layout">

  <div class="tabs-bar">
    <div class="tab" [class.active]="activeTab === 0" (click)="selectTab(0)">
      <ion-icon name="map-outline"></ion-icon>
    </div>
    <div class="tab" [class.active]="activeTab === 1" (click)="selectTab(1)">
      <ion-icon name="compass-outline"></ion-icon>
    </div>
    <div class="tab" [class.active]="activeTab === 2" (click)="selectTab(2)">
      <ion-icon name="flag-outline"></ion-icon>
    </div>
  </div>

  <div class="map-area">
    <div class="map-bg"></div>

    <!-- Info panel -->
    <div class="map-info-card" *ngIf="selectedMap">
      <div class="info-name">{{ selectedMap.name }}</div>
<ng-container *ngIf="selectedMap.spawns.length > 0; else noEnemies">
        <div class="info-enemy" *ngFor="let spawn of selectedMap.spawns">
          <div class="enemy-frame">
            <div class="enemy-sprite"
                 [ngStyle]="spriteStyle(spawn.enemyType)"
                 [ngClass]="spriteClass(spawn.enemyType)"></div>
            <span class="enemy-frame-name">{{ spawn.enemyType | enemyName }}</span>
          </div>
        </div>
      </ng-container>
      <ng-template #noEnemies>
        <div class="info-no-enemies">{{ 'MAP.SAFE_ZONE' | translate }}</div>
      </ng-template>
      <div class="info-chars" *ngIf="charsOnMap.length > 0">
        <div class="info-char" *ngFor="let c of charsOnMap">
          <app-character-sprite [size]="56" [equipmentSnapshot]="c.equipment"></app-character-sprite>
          <span class="info-char-name">{{ c.name }}</span>
        </div>
      </div>

      <button
        *ngIf="selectedMap.id !== currentMapId"
        class="teleport-btn"
        (click)="teleport(selectedMap.id)"
      >
        <ion-icon name="navigate-outline"></ion-icon>
      </button>
    </div>

    <!-- Tab 1: fondo alternativo -->
    <div class="map-bg alt-bg" *ngIf="activeTab === 1"></div>

    <!-- Tab 2: planeta interactivo (mini-instancia Phaser propia) -->
    <div class="planet-area" id="planet-view" *ngIf="activeTab === 2"></div>

    <!-- Tab 2: tarjeta de info del planeta seleccionado -->
    <div class="map-info-card planet-info-card" *ngIf="activeTab === 2 && selectedPlanet">
      <div class="info-name">{{ selectedPlanet.name }}</div>

      <div class="info-chars" *ngIf="charsOnPlanet.length > 0">
        <div class="info-char" *ngFor="let c of charsOnPlanet">
          <app-character-sprite [size]="56" [equipmentSnapshot]="c.equipment"></app-character-sprite>
          <span class="info-char-name">{{ c.name }}</span>
        </div>
      </div>
      <div class="info-no-enemies" *ngIf="charsOnPlanet.length === 0">{{ 'MAP.NO_CHARACTERS' | translate }}</div>

      <button class="teleport-btn" (click)="visitPlanet()" [title]="'MAP.VIEW_PLANET' | translate">
        <ion-icon name="planet-outline"></ion-icon>
      </button>
    </div>

    <!-- Map pins -->
    <ng-container *ngIf="activeTab === 0">
      <button
        *ngFor="let pin of pins"
        class="map-pin"
        [class.current]="pin.id === currentMapId"
        [class.selected]="selectedMap?.id === pin.id"
        [style.left.%]="pin.x"
        [style.top.%]="pin.y"
        (click)="selectPin(pin.id)"
        (dblclick)="teleport(pin.id)"
      >
        <div class="pin-marker">
          <ion-icon [name]="pin.id === 'hogar' ? 'home-outline' : 'location-outline'"></ion-icon>
        </div>
        <span class="pin-label">{{ pin.name }}</span>
      </button>
    </ng-container>
  </div>

</div>
