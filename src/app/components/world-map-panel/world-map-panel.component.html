<div class="panel-layout">

  <div class="map-area">

    <!-- Info panel (compartido: se rellena al pulsar un pin del globo) -->
    <div class="map-info-card" *ngIf="selectedMap">
      <div class="info-name">{{ selectedMap.name }}</div>
<div class="enemy-grid" *ngIf="selectedMap.spawns.length > 0">
        <div class="info-enemy" *ngFor="let spawn of selectedMap.spawns">
          <div class="enemy-frame">
            <div class="enemy-sprite"
                 [ngStyle]="spriteStyle(spawn.enemyType)"
                 [ngClass]="spriteClass(spawn.enemyType)"></div>
          </div>
        </div>
      </div>
      <div class="info-chars" *ngIf="charsOnMap.length > 0">
        <div class="info-char" *ngFor="let c of charsOnMap" [class.current]="c.isCurrent">
          <div class="enemy-frame char-frame">
            <app-character-sprite [size]="64" [equipmentSnapshot]="c.equipment" [characterName]="c.name"></app-character-sprite>
          </div>
          <span class="info-char-name">{{ c.name }}</span>
        </div>
      </div>

      <button
        *ngIf="selectedMap.id !== currentMapId && !isMapLocked(selectedMap.id)"
        class="teleport-btn"
        (click)="teleport(selectedMap.id)"
      >
        <ion-icon name="navigate-outline"></ion-icon>
      </button>
      <div class="map-locked-note" *ngIf="isMapLocked(selectedMap.id)">
        <ion-icon name="lock-closed"></ion-icon>
      </div>
    </div>

    <!-- Nombre del planeta en vista detalle (overlay Angular sobre el globo) -->
    <div class="planet-title" *ngIf="detailPlanetName">{{ detailPlanetName }}</div>

    <!-- Planeta interactivo (mini-instancia Phaser propia) -->
    <div class="planet-area" id="planet-view"></div>

    <!-- Lista de mapas desbloqueados del planeta; pinchar gira el globo -->
    <div class="planet-map-list" *ngIf="planetMapList.length > 0">
      <button
        *ngFor="let m of planetMapList"
        class="pml-item"
        [class.selected]="selectedMap?.id === m.id"
        (click)="focusPlanetMap(m.id)"
      >
        <span class="pml-name">{{ m.name }}</span>
      </button>
    </div>

    <!-- Tarjeta de info del planeta seleccionado -->
    <div class="map-info-card planet-info-card" *ngIf="selectedPlanet">
      <div class="info-name">{{ selectedPlanet.name }}</div>

      <div class="info-chars" *ngIf="charsOnPlanet.length > 0">
        <div class="info-char" *ngFor="let c of charsOnPlanet" [class.current]="c.isCurrent">
          <div class="enemy-frame char-frame">
            <app-character-sprite [size]="64" [equipmentSnapshot]="c.equipment" [characterName]="c.name"></app-character-sprite>
          </div>
          <span class="info-char-name">{{ c.name }}</span>
        </div>
      </div>
      <div class="info-no-enemies" *ngIf="charsOnPlanet.length === 0">{{ 'MAP.NO_CHARACTERS' | translate }}</div>

      <button class="teleport-btn" (click)="visitPlanet()" [title]="'MAP.VIEW_PLANET' | translate">
        <ion-icon name="planet-outline"></ion-icon>
      </button>
    </div>

  </div>

</div>
