<div class="panel-layout">

  <div class="tabs-bar">
    <div class="tab" [class.active]="activeTab === 0" (click)="activeTab = 0">
      <ion-icon name="map-outline"></ion-icon>
    </div>
    <div class="tab" [class.active]="activeTab === 1" (click)="activeTab = 1">
      <ion-icon name="compass-outline"></ion-icon>
    </div>
    <div class="tab" [class.active]="activeTab === 2" (click)="activeTab = 2">
      <ion-icon name="flag-outline"></ion-icon>
    </div>
  </div>

  <div class="map-area">
    <div class="map-bg"></div>

    <!-- Info panel -->
    <div class="map-info-card" *ngIf="selectedMap">
      <div class="info-name">{{ selectedMap.name }}</div>
<ng-container *ngIf="selectedMap.spawns.length > 0; else noEnemies">
        <div class="info-enemy" *ngFor="let spawn of selectedMap.spawns">
          <div class="enemy-frame">
            <div class="enemy-sprite"
                 [ngStyle]="spriteStyle(spawn.enemyType)"
                 [ngClass]="spriteClass(spawn.enemyType)"></div>
            <span class="enemy-frame-name">{{ spawn.enemyType | enemyName }}</span>
          </div>
        </div>
      </ng-container>
      <ng-template #noEnemies>
        <div class="info-no-enemies">Zona segura</div>
      </ng-template>
      <button
        *ngIf="selectedMap.id !== currentMapId"
        class="teleport-btn"
        (click)="teleport(selectedMap.id)"
      >
        <ion-icon name="navigate-outline"></ion-icon>
      </button>
    </div>

    <!-- Tab 1: fondo alternativo -->
    <div class="map-bg alt-bg" *ngIf="activeTab === 1"></div>

    <!-- Map pins -->
    <ng-container *ngIf="activeTab === 0">
      <button
        *ngFor="let pin of pins"
        class="map-pin"
        [class.current]="pin.id === currentMapId"
        [class.selected]="selectedMap?.id === pin.id"
        [style.left.%]="pin.x"
        [style.top.%]="pin.y"
        (click)="selectPin(pin.id)"
        (dblclick)="teleport(pin.id)"
      >
        <div class="pin-marker">
          <ion-icon [name]="pin.id === 'hogar' ? 'home-outline' : 'location-outline'"></ion-icon>
        </div>
        <span class="pin-label">{{ pin.name }}</span>
      </button>
    </ng-container>
  </div>

</div>
