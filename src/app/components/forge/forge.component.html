<div cdkDropListGroup class="forge-root">

  <div class="forge-title">Forja</div>

  <!-- Pestañas: visibles solo si la mejora de cuenta "Mejoras de forjas" está activa,
       pero RESERVAN su hueco siempre (visibility) para no descolocar la producción. -->
  <div class="forge-tabs" [class.is-hidden]="!(forgeUpgradesUnlocked$ | async)">
    <button class="forge-tab" [class.is-active]="tab === 'forja'" (click)="setTab('forja')">Forja</button>
    <button class="forge-tab" [class.is-active]="tab === 'mejoras'" (click)="setTab('mejoras')">Mejoras</button>
  </div>

  <!-- 0) Producir: visible si no hay pestañas (bloqueado) o estás en la pestaña Forja. -->
  <div class="forge-section forge-prod-section" *ngIf="!(forgeUpgradesUnlocked$ | async) || tab === 'forja'">
    <div class="forge-prod-wrap">

      <!-- Columna izquierda: mineral (arriba) + combustible (debajo), cada uno con su etiqueta. -->
      <div class="forge-left-col">
        <div class="forge-slot">
          <div class="forge-tag">Mineral</div>
          <!-- Material: arrastra aquí el mineral. La barra a producir se deduce de él. -->
          <div class="forge-mat-cell" cdkDropList cdkDropListSortingDisabled
               [id]="'forge-mat-0'"
               [cdkDropListConnectedTo]="inventoryCellIds"
               [cdkDropListEnterPredicate]="matEnter"
               (cdkDropListDropped)="onCellDrop($event, 'mat', 0)"
               (click)="onCellClick('mat', 0)">
            <div *ngIf="mat[0]; else matPh" class="forge-item" cdkDrag
                 [cdkDragData]="{ sourceContext: 'forge', grid: 'mat', index: 0, item: mat[0] }"
                 [title]="mat[0].name">
              <ng-container *ngTemplateOutlet="icon; context: { $implicit: mat[0] }"></ng-container>
            </div>
            <ng-template #matPh>
              <img class="forge-cell-ph" src="assets/icon/resources/mining/tier3_drop.png" alt="">
            </ng-template>
          </div>
        </div>

        <div class="forge-slot">
          <div class="forge-tag">Fuel</div>
          <div class="forge-fuel-cell" cdkDropList cdkDropListSortingDisabled
               [id]="'forge-fuel-0'"
               [cdkDropListConnectedTo]="inventoryCellIds"
               [cdkDropListEnterPredicate]="fuelEnter"
               (cdkDropListDropped)="onCellDrop($event, 'fuel', 0)"
               (click)="onCellClick('fuel', 0)">
            <div *ngIf="fuel[0]; else fuelPh" class="forge-item" cdkDrag
                 [cdkDragData]="{ sourceContext: 'forge', grid: 'fuel', index: 0, item: fuel[0] }"
                 [title]="fuel[0].name">
              <ng-container *ngTemplateOutlet="icon; context: { $implicit: fuel[0] }"></ng-container>
            </div>
            <ng-template #fuelPh>
              <img class="forge-cell-ph" src="assets/icon/resources/madera_t1.png" alt="">
            </ng-template>
          </div>
        </div>
      </div>

      <!-- Flecha: material → botón -->
      <div class="forge-arrow">&#10146;</div>

      <!-- Cuadro de la fragua: muestra la barra que se producirá (deducida del mineral) -->
      <div class="forge-prod-col">
        <div class="forge-tag">Produciendo</div>

        <!-- Tiempo de la unidad actual, arriba (el aro del cuadro muestra su progreso) -->
        <div class="forge-timer forge-timer--unit">{{ fmtTime(remaining$ | async) }}</div>

        <!-- Botón único play/pausa, encima del cuadro central -->
        <div class="forge-controls">
          <button class="forge-ctrl forge-ctrl--play"
                  [class.is-active]="running$ | async"
                  [disabled]="!(running$ | async) && !(ready$ | async)"
                  (click)="toggle()"
                  [title]="(running$ | async) ? 'Pausar' : 'Producir'">
            <ng-container *ngIf="running$ | async; else playIcon">&#10074;&#10074;</ng-container>
            <ng-template #playIcon>&#9654;</ng-template>
          </button>
        </div>

        <!-- Cuadro de la fragua con el aro de progreso de la UNIDAD actual como borde -->
        <div class="forge-prod-frame">
          <svg class="forge-prod-ring" viewBox="0 0 54 54">
            <rect class="forge-ring-track" x="2" y="2" width="50" height="50" rx="8"></rect>
            <rect #ringFill class="forge-ring-fill" x="2" y="2" width="50" height="50" rx="8"
                  pathLength="100" stroke-dashoffset="100"></rect>
          </svg>
          <div class="forge-prod-btn" [class.is-producing]="(running$ | async) && (producing$ | async)">
            <div class="forge-bar-icon" *ngIf="currentBar$ | async as bar"
                 [ngStyle]="barStyle(bar.box)"></div>
          </div>
          <!-- Contador de barras producibles con el stock (baja al completar cada una) -->
          <div class="forge-prod-count" *ngIf="(producible$ | async) as n">{{ n }}</div>
        </div>

        <!-- Barra del lote total (todas las barras posibles con el stock) + su tiempo -->
        <div class="forge-bar-row">
          <div class="forge-progress forge-progress--total">
            <span #totalFill></span>
          </div>
          <div class="forge-timer">{{ fmtTime(totalRemaining$ | async) }}</div>
        </div>
      </div>

      <!-- Flecha: botón → salida -->
      <div class="forge-arrow">&#10146;</div>

      <!-- Salida: aquí sale la barra producida; se arrastra/doble clic al inventario. -->
      <div class="forge-slot forge-slot--out">
        <div class="forge-tag">Salida</div>
        <div class="forge-out-cell" cdkDropList cdkDropListSortingDisabled
             [id]="'forge-out-0'"
             [cdkDropListConnectedTo]="inventoryCellIds"
             [cdkDropListEnterPredicate]="outEnter"
             (cdkDropListDropped)="onCellDrop($event, 'out', 0)"
             (click)="onCellClick('out', 0)">
          <div *ngIf="out[0]" class="forge-item" cdkDrag
               [cdkDragData]="{ sourceContext: 'forge', grid: 'out', index: 0, item: out[0] }"
               [title]="out[0].name">
            <ng-container *ngTemplateOutlet="icon; context: { $implicit: out[0] }"></ng-container>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Pestaña Mejoras: solo si está desbloqueada y seleccionada. Vacía de momento. -->
  <div class="forge-section forge-upgrades" *ngIf="(forgeUpgradesUnlocked$ | async) && tab === 'mejoras'">
    <div class="forge-upgrades-empty">Sin mejoras todavía</div>
  </div>

</div>

<!-- Render del icono de un item (igual que inventario/tienda) -->
<ng-template #icon let-cell>
  <div *ngIf="cell.iconSheet != null" class="item-icon-sheet"
       [style.background-image]="'url(' + cell.iconSheet + ')'"
       [style.background-size]="getSheetBgSize(cell.iconFrameCols, cell.iconFrameSize, cell.iconContentSize)"
       [style.background-position]="getSheetPos(cell.iconFrame, cell.iconFrameCols, cell.iconFrameSize, cell.iconContentSize)"></div>
  <img *ngIf="cell.icon && cell.iconSheet == null" [src]="cell.icon" class="item-icon">
  <span *ngIf="!cell.icon && cell.iconSheet == null" class="item-fallback">{{ cell.name.charAt(0) }}</span>
  <div class="item-sum" *ngIf="cell.sum !== undefined">{{ cell.sum }}</div>
</ng-template>
