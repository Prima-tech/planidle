<app-item-detail [item]="selectedItemData" [panelStyle]="detailPanelStyle"></app-item-detail>

<!-- Tabs -->
<div class="tabs" (click)="$event.stopPropagation()">
  <div
    *ngFor="let tab of tabs; let index = index"
    class="tab"
    [attr.data-tab-index]="index"
    [ngClass]="{ active: index === activeTabIndex }"
    (click)="selectTab(index); $event.stopPropagation()"
  >
    {{ tab }}
  </div>
</div>

<!-- Los 4 grids siempre en el DOM. CDK los ve todos desde el inicio del drag. -->
<div class="inventory-grid" cdkDropListGroup>
  <div
    *ngFor="let inventory of inventories; let tabIndex = index"
    [class.tab-active]="activeTabIndex === tabIndex"
    [class.tab-inactive]="activeTabIndex !== tabIndex"
  >
    <div *ngFor="let row of inventory; let rowIndex = index" class="inventory-row">
      <div
        *ngFor="let cell of row; let colIndex = index"
        class="inventory-cell"
        cdkDropList
        cdkDropListSortingDisabled
        [id]="'inv-' + tabIndex + '-' + rowIndex + '-' + colIndex"
        [cdkDropListConnectedTo]="equipmentSlotIds"
        [cdkDropListData]="{ tabIndex: tabIndex, row: rowIndex, col: colIndex, item: cell }"
        (cdkDropListDropped)="onDrop($event, tabIndex, rowIndex, colIndex)"
        (click)="$event.stopPropagation()"
      >
        <ng-container *ngIf="cell">
          <div
            class="inventory-item"
            cdkDrag
            [cdkDragData]="{ sourceContext: 'inventory', tabIndex: tabIndex, row: rowIndex, col: colIndex, item: cell }"
            (cdkDragMoved)="onDragMoved($event)"
            (click)="selectItem(tabIndex, rowIndex, colIndex, $event)"
            [title]="cell.name"
            [ngClass]="{
              selected:
                selectedItem &&
                selectedItem.tabIndex === tabIndex &&
                selectedItem.row === rowIndex &&
                selectedItem.col === colIndex
            }"
          >
            <div *ngIf="cell.iconSheet != null"
                 class="item-icon-sheet"
                 [style.background-image]="'url(' + cell.iconSheet + ')'"
                 [style.background-position]="getSheetPos(cell.iconFrame)">
            </div>
            <img *ngIf="cell.icon && cell.iconSheet == null" [src]="cell.icon" class="item-icon">
            <span *ngIf="!cell.icon && cell.iconSheet == null" class="item-fallback">{{ cell.name.charAt(0) }}</span>
            <div class="item-sum" *ngIf="cell.sum !== undefined">{{ cell.sum }}</div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>

<!-- Botones -->
<div class="button-bar" (click)="$event.stopPropagation()">
  <button (click)="openSplitMenu($event)">{{ 'INVENTORY.BTN.SPLIT' | translate }}</button>
  <button (click)="openDeleteModal($event)">{{ 'INVENTORY.BTN.DELETE' | translate }}</button>
  <button (click)="sortInventory()">{{ 'INVENTORY.BTN.SORT' | translate }}</button>
</div>

<!-- Menú Split -->
<div class="split-menu" *ngIf="splitMenuOpen" (click)="$event.stopPropagation()">
  <span>{{ 'INVENTORY.QUANTITY' | translate }}</span>
  <button (click)="decreaseSplitValue()">−</button>
  <input type="number" [value]="splitValue" readonly />
  <button (click)="increaseSplitValue()">+</button>
  <button (click)="executeSplit($event)">{{ 'INVENTORY.BTN.OK' | translate }}</button>
</div>

<!-- Modal Borrar -->
<div class="modal-overlay" *ngIf="deleteModalOpen" (click)="cancelDelete($event)">
  <div class="modal" (click)="$event.stopPropagation()">
    <p>{{ 'INVENTORY.CONFIRM_DELETE' | translate }}</p>
    <div class="modal-buttons">
      <button (click)="confirmDelete($event)">{{ 'INVENTORY.BTN.ACCEPT' | translate }}</button>
      <button (click)="cancelDelete($event)">{{ 'INVENTORY.BTN.CANCEL' | translate }}</button>
    </div>
  </div>
</div>
