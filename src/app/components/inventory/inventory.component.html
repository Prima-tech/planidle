<app-item-detail [item]="selectedItemData" [panelStyle]="detailPanelStyle"></app-item-detail>

<!-- Tabs -->
<div class="tabs" (click)="$event.stopPropagation()">
  <div
    *ngFor="let tab of tabs; let index = index"
    class="tab"
    [attr.data-tab-index]="index"
    [ngClass]="{ active: index === activeTabIndex }"
    (click)="selectTab(index); $event.stopPropagation()"
  >
    {{ tab }}
  </div>
</div>

<!-- Los 4 grids siempre en el DOM. CDK los ve todos desde el inicio del drag. -->
<div class="inventory-grid" cdkDropListGroup>
  <div
    *ngFor="let inventory of inventories; let tabIndex = index"
    [class.tab-active]="activeTabIndex === tabIndex"
    [class.tab-inactive]="activeTabIndex !== tabIndex"
  >
    <div *ngFor="let row of inventory; let rowIndex = index" class="inventory-row">
      <div
        *ngFor="let cell of row; let colIndex = index"
        class="inventory-cell"
        cdkDropList
        cdkDropListSortingDisabled
        [id]="'inv-' + tabIndex + '-' + rowIndex + '-' + colIndex"
        [cdkDropListConnectedTo]="equipmentSlotIds"
        [cdkDropListData]="{ tabIndex: tabIndex, row: rowIndex, col: colIndex, item: cell }"
        (cdkDropListDropped)="onDrop($event, tabIndex, rowIndex, colIndex)"
        (click)="$event.stopPropagation()"
      >
        <ng-container *ngIf="cell">
          <div
            class="inventory-item"
            cdkDrag
            [cdkDragData]="{ sourceContext: 'inventory', tabIndex: tabIndex, row: rowIndex, col: colIndex, item: cell }"
            (cdkDragMoved)="onDragMoved($event)"
            (click)="selectItem(tabIndex, rowIndex, colIndex, $event)"
            [title]="cell.name"
            [ngClass]="{
              selected:
                selectedItem &&
                selectedItem.tabIndex === tabIndex &&
                selectedItem.row === rowIndex &&
                selectedItem.col === colIndex
            }"
          >
            <div *ngIf="cell.iconSheet != null"
                 class="item-icon-sheet"
                 [class.item-icon-sheet--equip]="cell.iconFrameSize != null"
                 [class.item-icon-sheet--armour]="cell.category === 'Armadura'"
                 [class.item-icon-sheet--pants]="cell.category === 'Pantalones'"
                 [class.item-icon-sheet--boots]="cell.category === 'Botas'"
                 [class.item-icon-sheet--weapon]="cell.category === 'Arma'"
                 [style.background-image]="'url(' + cell.iconSheet + ')'"
                 [style.background-size]="getSheetBgSize(cell.iconFrameCols, cell.iconFrameSize, cell.iconContentSize)"
                 [style.background-position]="getSheetPos(cell.iconFrame, cell.iconFrameCols, cell.iconFrameSize, cell.iconContentSize)">
            </div>
            <img *ngIf="cell.icon && cell.iconSheet == null" [src]="cell.icon" class="item-icon">
            <span *ngIf="!cell.icon && cell.iconSheet == null" class="item-fallback">{{ cell.name.charAt(0) }}</span>
            <div class="item-sum" *ngIf="cell.sum !== undefined">{{ cell.sum }}</div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>

<!-- Botones -->
<div class="button-bar" (click)="$event.stopPropagation()">
  <button class="btn-action" (click)="openSplitMenu($event)" title="Split">
    <ion-icon name="git-branch-outline"></ion-icon>
  </button>
  <button class="btn-action btn-danger" (click)="openDeleteModal($event)" title="Borrar">
    <ion-icon name="trash-outline"></ion-icon>
  </button>
  <button class="btn-action" (click)="sortInventory()" title="Ordenar">
    <ion-icon name="swap-vertical-outline"></ion-icon>
  </button>
</div>

<!-- Menú Split -->
<div class="split-menu" *ngIf="splitMenuOpen" (click)="$event.stopPropagation()">
  <span>{{ 'INVENTORY.QUANTITY' | translate }}</span>
  <button (click)="decreaseSplitValue()">−</button>
  <input type="number" [value]="splitValue" readonly />
  <button (click)="increaseSplitValue()">+</button>
  <button (click)="executeSplit($event)">{{ 'INVENTORY.BTN.OK' | translate }}</button>
</div>

<!-- Modal Borrar -->
<div class="modal-overlay" *ngIf="deleteModalOpen" (click)="cancelDelete($event)">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-icon-wrap">
      <ion-icon name="trash-outline" class="modal-trash-icon"></ion-icon>
    </div>

    <div class="modal-title">¿Borrar objeto?</div>

    <div class="modal-item-preview" *ngIf="selectedItemData as item">
      <div class="modal-item-icon">
        <div *ngIf="item.iconSheet != null"
             class="item-icon-sheet"
             [style.background-image]="'url(' + item.iconSheet + ')'"
             [style.background-size]="getSheetBgSize(item.iconFrameCols, item.iconFrameSize, item.iconContentSize)"
             [style.background-position]="getSheetPos(item.iconFrame, item.iconFrameCols, item.iconFrameSize, item.iconContentSize)">
        </div>
        <img *ngIf="item.icon && item.iconSheet == null" [src]="item.icon" class="item-icon">
        <span *ngIf="!item.icon && item.iconSheet == null" class="item-fallback">{{ item.name.charAt(0) }}</span>
      </div>
      <span class="modal-item-name">{{ item.name }}</span>
    </div>

    <p class="modal-warning">Esta acción no se puede deshacer.</p>

    <div class="modal-buttons">
      <button class="btn-cancel" (click)="cancelDelete($event)">Cancelar</button>
      <button class="btn-delete" (click)="confirmDelete($event)">Borrar</button>
    </div>

  </div>
</div>
