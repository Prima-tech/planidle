<div class="log-panel">
  <div
    *ngFor="let entry of entries; trackBy: trackById"
    class="log-entry"
    [class.drop]="entry.type === 'drop'"
    [class.coin]="entry.type === 'coin'"
    [class.regen-hp]="entry.type === 'regen-hp'"
    [class.regen-mp]="entry.type === 'regen-mp'"
    [class.fading]="entry.fading"
    [class.bumped]="entry.bumped"
  >
    {{ entry.label }}
  </div>
</div>
