<div class="loading-cover" [class.loading-cover--hidden]="dataLoaded && sceneVisible">
  <span class="loading-cover__version">v{{ appVersion }}</span>
  <span class="loading-cover__text">{{ 'COMMON.LOADING_TEXT' | translate }}</span>
</div>

<app-top-bar *ngIf="dataLoaded && sceneVisible" (openEquipment)="footerBar.openEquipment()"></app-top-bar>
<app-quest-tracker *ngIf="dataLoaded && sceneVisible"></app-quest-tracker>
<ion-content>

  <!-- Zona estática -->
  <div class="zona-estatica">
    <div id="game"></div>
    <!-- Aro de piedra sobre el minimapa Phaser (MM_TOP/MM_MARGIN=10, MM_RADIUS=49) -->
    <div class="minimap-frame" *ngIf="dataLoaded && sceneVisible && !(playerBridgeService.runMode$ | async)" (click)="footerBar.openWorldMap()">
      <span class="minimap-name">{{ (worldService.currentMap$ | async)?.name }}</span>
      <button class="minimap-btn minimap-btn--bag" (click)="footerBar.openInventory(); $event.stopPropagation()">
        <img class="minimap-btn-img minimap-btn-img--bag" src="assets/icon/menu/inventory.png" alt="" draggable="false" />
      </button>
      <button class="minimap-btn minimap-btn--settings" (click)="footerBar.openGameSettings(); $event.stopPropagation()">
        <img class="minimap-btn-img" src="assets/icon/menu/config.png" alt="" draggable="false" />
      </button>
      <button class="minimap-btn minimap-btn--shop" (click)="footerBar.openShop(); $event.stopPropagation()">
        <ion-icon name="storefront-outline"></ion-icon>
      </button>
    </div>
  </div>

  <!-- Zona dinámica-->
  <div class="dinamyc-area">
    <router-outlet></router-outlet>
  </div>
</ion-content>

<app-hud-skill-buttons *ngIf="dataLoaded && sceneVisible && !(playerBridgeService.runMode$ | async)"></app-hud-skill-buttons>
<!-- El impulso solo existe si se ha comprado su hito (1 estrella) en el panel de hitos. -->
<app-sprint-button *ngIf="dataLoaded && sceneVisible && (playerBridgeService.runMode$ | async) && (playerStateService.runMilestones$ | async)?.includes('sprint')"></app-sprint-button>
<app-run-stats *ngIf="dataLoaded && sceneVisible && (playerBridgeService.runMode$ | async)" (openSettings)="footerBar.openGameSettings()"></app-run-stats>
<!-- En exploración no hay botón de saltar: se salta tocando la pantalla (lo gestiona
     WorldRunScene.bindInput con pointerdown). El botón de ataque solo en modo normal. -->
<app-attack-button *ngIf="dataLoaded && sceneVisible && !(playerBridgeService.runMode$ | async)"></app-attack-button>
<app-npc-dialogue *ngIf="dataLoaded && sceneVisible"></app-npc-dialogue>
<app-game-log></app-game-log>
<app-footer-bar #footerBar></app-footer-bar>

<app-offline-gains-modal
  *ngIf="dataLoaded && sceneVisible && pendingGains"
  [gains]="pendingGains"
  (collected)="collectGains($event)">
</app-offline-gains-modal>

<app-death-modal
  *ngIf="playerDead"
  (revived)="onRevive()">
</app-death-modal>

<app-achievement-toast></app-achievement-toast>

<app-build-delete-modal></app-build-delete-modal>

<app-map-entrance-modal></app-map-entrance-modal>

<app-map-teleport-hint *ngIf="dataLoaded && sceneVisible"></app-map-teleport-hint>
