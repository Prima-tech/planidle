<div class="loading-cover" [class.loading-cover--hidden]="dataLoaded && sceneVisible">
  <span class="loading-cover__text">Cargando...</span>
</div>

<app-top-bar *ngIf="dataLoaded && sceneVisible"></app-top-bar>
<ion-content>

  <!-- Zona estática -->
  <div class="zona-estatica">
    <div id="game"></div>
  </div>

  <!-- Zona dinámica-->
  <div class="dinamyc-area">
    <router-outlet></router-outlet>
  </div>
</ion-content>

<app-game-log></app-game-log>
<app-footer-bar></app-footer-bar>

<app-offline-gains-modal
  *ngIf="dataLoaded && sceneVisible && pendingGains"
  [gains]="pendingGains"
  (collected)="collectGains($event)">
</app-offline-gains-modal>

<app-death-modal
  *ngIf="playerDead"
  (revived)="onRevive()">
</app-death-modal>
