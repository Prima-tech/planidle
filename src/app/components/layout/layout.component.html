<div class="loading-cover" [class.loading-cover--hidden]="dataLoaded && sceneVisible">
  <span class="loading-cover__text">Cargando...</span>
</div>

<app-top-bar *ngIf="dataLoaded && sceneVisible"></app-top-bar>
<ion-content>

  <!-- Zona estática -->
  <div class="zona-estatica">
    <div id="game"></div>
    <!-- Aro de piedra sobre el minimapa Phaser (MM_TOP/MM_MARGIN=10, MM_RADIUS=49) -->
    <div class="minimap-frame" *ngIf="dataLoaded && sceneVisible">
      <span class="minimap-name">{{ (worldService.currentMap$ | async)?.name }}</span>
      <button class="minimap-btn" (click)="footerBar.openInventory()">
        <ion-icon name="bag-outline"></ion-icon>
      </button>
    </div>
  </div>

  <!-- Zona dinámica-->
  <div class="dinamyc-area">
    <router-outlet></router-outlet>
  </div>
</ion-content>

<app-hud-skill-buttons *ngIf="dataLoaded && sceneVisible"></app-hud-skill-buttons>
<app-game-log></app-game-log>
<app-footer-bar #footerBar></app-footer-bar>

<app-offline-gains-modal
  *ngIf="dataLoaded && sceneVisible && pendingGains"
  [gains]="pendingGains"
  (collected)="collectGains($event)">
</app-offline-gains-modal>

<app-death-modal
  *ngIf="playerDead"
  (revived)="onRevive()">
</app-death-modal>
