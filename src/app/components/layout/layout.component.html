<div class="loading-cover" [class.loading-cover--hidden]="dataLoaded"></div>
<app-top-bar *ngIf="dataLoaded"></app-top-bar>
<ion-content>

  <!-- Zona estática -->
  <div class="zona-estatica">
    <div id="game"></div>
  </div>

  <!-- Zona dinámica-->
  <div class="dinamyc-area">
    <router-outlet></router-outlet>
  </div>
</ion-content>

<app-game-log></app-game-log>
<div class="map-label-bar">
  <app-map-label></app-map-label>
</div>
<app-footer-bar></app-footer-bar>

<app-offline-gains-modal
  *ngIf="dataLoaded && pendingGains"
  [gains]="pendingGains"
  (collected)="collectGains($event)">
</app-offline-gains-modal>

<app-death-modal
  *ngIf="playerDead"
  (revived)="onRevive()">
</app-death-modal>
