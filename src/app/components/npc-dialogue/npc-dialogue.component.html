<div class="dlg-overlay" *ngIf="line">
  <div class="dlg-box" [class.leaving]="leaving" (click)="onBoxClick()">
    <div class="dlg-speaker">{{ line.speaker }}</div>
    <button
      class="dlg-close"
      type="button"
      aria-label="Finalizar conversación"
      (click)="$event.stopPropagation(); dismiss()">✕</button>
    <div class="dlg-avatar" *ngIf="portraitStyle" [ngStyle]="portraitStyle"></div>
    <div class="dlg-text" #dlgText>{{ displayText }}</div>
    <div class="dlg-hint" *ngIf="!hasMorePages && line.hasNext">▼</div>
  </div>
</div>
