<div class="build-title">{{ 'BUILD.TITLE' | translate }}</div>

<div class="build-grid">
  <button *ngFor="let def of buildables" class="build-card" (click)="select(def)">
    <div class="build-frame">
      <div [ngStyle]="frameStyle(def)"></div>
    </div>
    <span class="build-label">{{ def.name | translate }}</span>
  </button>

  <div class="build-empty" *ngIf="!buildables.length">{{ 'BUILD.NONE' | translate }}</div>
</div>

<button class="rpg-btn rpg-btn--block build-move-btn" [disabled]="!hasBuildings" (click)="startMove()">
  <ion-icon name="move-outline"></ion-icon>
  <span>{{ 'BUILD.MOVE' | translate }}</span>
</button>

<button class="rpg-btn rpg-btn--block build-move-btn build-delete-btn" [disabled]="!hasBuildings" (click)="startDelete()">
  <ion-icon name="trash-outline"></ion-icon>
  <span>{{ 'BUILD.DELETE' | translate }}</span>
</button>
