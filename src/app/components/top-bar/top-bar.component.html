<div class="top-bar">
  <div class="avatar-wrapper">
    <div class="avatar-icon" [ngClass]="'avatar-icon--' + classKey">
      <ion-icon [name]="classIcon"></ion-icon>
    </div>
    <div class="name">{{asgardService?.selectedPlayer?.name}}</div>
  </div>
  <div class="bars-stack" *ngIf="initStatusBar">
    <app-status-bar [class]="'health'" [service$]="valueHP$"></app-status-bar>
    <app-status-bar [class]="'experience'" [service$]="valueXP$"></app-status-bar>
  </div>
  <div class="right-side">
    <div class="coins-wrapper">
      <div class="coin-placeholder">
        {{ coins$ | async }}
      </div>
      <div class="coin-spinner"></div>
    </div>
    <app-map-label></app-map-label>
  </div>
</div>
