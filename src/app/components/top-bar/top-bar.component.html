<div class="top-bar">

  <!-- Panel personaje + buffos -->
  <div class="left-side">
    <div class="char-panel">

      <!-- Avatar + nombre apilados -->
      <div class="avatar-col">
        <div class="avatar-icon" [ngClass]="'avatar-icon--' + classKey">
          <ion-icon [name]="classIcon"></ion-icon>
        </div>
        <div class="char-name">{{ asgardService?.selectedPlayer?.name }}</div>
      </div>

      <!-- Barras -->
      <div class="char-info" *ngIf="initStatusBar">

        <ng-container *ngIf="valueHP$ | async as hp">
          <div class="bar-row">
            <div class="bar-track">
              <div class="bar-fill bar-fill--hp" [style.width.%]="hp.ratio * 100"></div>
            </div>
            <span class="bar-text">{{ hp.current }} / {{ hp.max }}</span>
          </div>
        </ng-container>

        <ng-container *ngIf="valueMP$ | async as mp">
          <div class="bar-row">
            <div class="bar-track">
              <div class="bar-fill bar-fill--mp" [style.width.%]="mp.ratio * 100"></div>
            </div>
            <span class="bar-text">{{ mp.current }} / {{ mp.max }}</span>
          </div>
        </ng-container>

        <ng-container *ngIf="valueXP$ | async as xp">
          <div class="bar-row">
            <div class="bar-track">
              <div class="bar-fill bar-fill--xp" [style.width.%]="xp.ratio * 100"></div>
            </div>
            <span class="bar-text">{{ xp.current }} / {{ xp.max }}</span>
          </div>
        </ng-container>

      </div>
    </div>

    <!-- Buffos activos -->
    <div class="buff-list" *ngIf="activeBuffs.length > 0">
      <div class="buff-item" *ngFor="let buff of activeBuffs">
        <div class="buff-icon"
             [style.background-image]="'url(' + buff.icon + ')'"
             [style.--ratio]="buffRatios[buff.id]">
        </div>
      </div>
    </div>
  </div>

  <!-- Derecha: monedas + mapa -->
  <div class="right-side">
    <div class="coins-wrapper">
      <div class="coin-spinner"></div>
      <span class="coin-amount">{{ coins$ | async }}</span>
    </div>
    <app-map-label></app-map-label>
  </div>

</div>
