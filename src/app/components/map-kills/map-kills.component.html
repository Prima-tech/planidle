<div class="panel">

  <div class="section-title">
    <span class="section-icon">⚔️</span>
    {{ mapName }}
    <span class="sub">Bajas del mapa</span>
  </div>

  <ng-container *ngIf="rows.length > 0; else noKills">
    <div class="kill-entry" *ngFor="let row of rows">

      <div class="entry-header">
        <span class="type-name">{{ row.type }}</span>
        <span class="total-badge">{{ row.total }} bajas</span>
      </div>

      <div class="elite-progress">
        <div class="bar-track">
          <div class="bar-fill" [style.width.%]="row.progress * 100"></div>
        </div>
        <span class="bar-label" *ngIf="row.remaining > 0">
          {{ row.sessionKills % row.threshold }}/{{ row.threshold }} — faltan {{ row.remaining }}
        </span>
        <span class="bar-label elite-ready" *ngIf="row.remaining === 0 && row.sessionKills > 0">
          ¡ELITE SPAWNEADO!
        </span>
        <span class="bar-label muted" *ngIf="row.sessionKills === 0">
          Sin bajas en esta sesión
        </span>
      </div>

    </div>
  </ng-container>

  <ng-template #noKills>
    <div class="empty">Ningún enemigo derrotado en este mapa</div>
  </ng-template>

</div>
