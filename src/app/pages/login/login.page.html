<ion-content [fullscreen]="true">
  <div class="bg-overlay">
    <div class="login-card">

      <div class="login-brand">
        <div class="login-emblem">
          <ion-icon name="shield-half-outline" class="emblem-icon"></ion-icon>
        </div>
        <h1 class="game-title">VALHALLA</h1>
        <p class="game-brand-sub">Idle RPG</p>
        <p class="game-subtitle">{{ 'LOGIN.TAGLINE' | translate }}</p>
      </div>

      <div class="login-divider"></div>

      <div class="login-form">

        <div class="input-wrapper">
          <ion-icon name="person-outline" class="input-icon"></ion-icon>
          <ion-input [(ngModel)]="email" type="email" [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate" class="dark-input"></ion-input>
        </div>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <ion-input [(ngModel)]="password" type="password" [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate" class="dark-input"></ion-input>
        </div>

        <button class="rpg-btn rpg-btn--block login-btn" (click)="login()" [disabled]="loading">{{ 'LOGIN.BUTTON' | translate }}</button>

        <button *ngIf="!guestId" class="guest-btn" (click)="loginAsGuest()" [disabled]="loading">
          <ion-icon name="person-circle-outline"></ion-icon>
          <span>{{ 'LOGIN.GUEST' | translate }}</span>
        </button>

        <button *ngIf="guestId" class="guest-btn guest-btn--resume" (click)="resumeGuest()" [disabled]="loading">
          <ion-icon name="person-circle-outline"></ion-icon>
          <span>{{ 'LOGIN.GUEST_RESUME' | translate }}</span>
          <span class="guest-id">{{ guestId.slice(0, 8) }}</span>
        </button>

        <button *ngIf="guestId" class="guest-new-link" (click)="loginAsGuest()" [disabled]="loading">
          {{ 'LOGIN.GUEST_NEW' | translate }}
        </button>

        <p class="login-error" *ngIf="error">{{ error }}</p>
      </div>

    </div>

    <!-- Toggles compactos: solo la palabra. ON = ese modo activo
         (Local ON = jugar en local · Admin ON = modo admin). -->
    <div class="mode-toggles">
      <div class="mode-toggle">
        <span class="mode-label">Local</span>
        <ion-toggle [(ngModel)]="localMode"></ion-toggle>
      </div>

      <div class="mode-toggle">
        <span class="mode-label">Admin</span>
        <ion-toggle [(ngModel)]="admin"></ion-toggle>
      </div>
    </div>

    <span class="app-version">v{{ appVersion }}</span>
  </div>
</ion-content>
