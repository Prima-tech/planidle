<div class="settings-panel">

  <div class="conn-status" [class.online]="connected" [class.offline]="!connected">
    <span class="conn-dot"></span>
    <span class="conn-text">{{ connected ? 'Conectado a Supabase' : 'No estás conectado (modo local)' }}</span>
  </div>

  <div class="settings-body">

    <!-- PERSONAJE -->
    <div class="settings-section">
      <p class="section-label">{{ 'SETTINGS.SECTION.CHARACTER' | translate }}</p>
      <button class="settings-btn wide" (click)="changePlayer()">
        <span class="btn-icon">🔄</span>
        <span>{{ 'SETTINGS.BTN.CHANGE_PLAYER' | translate }}</span>
      </button>
      <button class="settings-btn wide logout-btn" (click)="logout()">
        <span class="btn-icon">🚪</span>
        <span>Cerrar sesión</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- GUARDAR -->
    <div class="settings-section">
      <p class="section-label">{{ 'SETTINGS.SECTION.GAME' | translate }}</p>

      <button
        class="settings-btn save-btn"
        [class.saving]="isSaving$ | async"
        [class.saved]="(saveStatus$ | async) === 'saved'"
        [class.error]="(saveStatus$ | async) === 'error'"
        [disabled]="isSaving$ | async"
        (click)="save()">
        <span class="btn-icon">
          <span *ngIf="(saveStatus$ | async) === 'idle'">💾</span>
          <span *ngIf="(saveStatus$ | async) === 'local'">⏳</span>
          <span *ngIf="(saveStatus$ | async) === 'remote'">☁</span>
          <span *ngIf="(saveStatus$ | async) === 'saved'">✓</span>
          <span *ngIf="(saveStatus$ | async) === 'error'">✕</span>
        </span>
        <span>{{ saveLabel$ | async | translate }}</span>
      </button>

    </div>

    <div class="divider"></div>

    <!-- PELIGROSO -->
    <div class="settings-section">
      <p class="section-label debug-label">{{ 'SETTINGS.SECTION.DANGEROUS' | translate }}</p>
      <button class="settings-btn danger wide" (click)="clearAll()">
        <span class="btn-icon">🗑</span>
        <span>{{ 'SETTINGS.BTN.CLEAR_ALL' | translate }}</span>
      </button>
    </div>

  </div>

</div>
